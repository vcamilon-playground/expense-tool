name: E2E Auto-Heal

on:
  workflow_run:
    workflows: ["E2E Tests"]
    types: [completed]

# Only one autoheal at a time; cancel a queued one if a newer failure arrives.
concurrency:
  group: autoheal
  cancel-in-progress: true

jobs:
  autoheal:
    name: Auto-heal failing tests
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main (with PAT so push re-triggers CI)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          ref: main
          fetch-depth: 2

      - name: Skip if last commit is already an autoheal fix
        id: guard
        run: |
          LAST_MSG=$(git log -1 --format="%s")
          echo "Last commit: $LAST_MSG"
          if echo "$LAST_MSG" | grep -q "\[autoheal\]"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Last commit is already an autoheal fix — stopping to prevent loop."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get failure logs
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run view ${{ github.event.workflow_run.id }} --log-failed \
            > /tmp/failure-logs.txt 2>&1 || true
          echo "=== Failure logs ===" && cat /tmp/failure-logs.txt

      - name: Set up Node
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name "Claude Auto-Heal"
          git config user.email "autoheal@users.noreply.github.com"

      - name: Run autoheal script
        if: steps.guard.outputs.skip == 'false'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/autoheal.mjs /tmp/failure-logs.txt

      - name: Commit and push fix (only if files changed)
        if: steps.guard.outputs.skip == 'false'
        run: |
          git diff --quiet && echo "No changes — nothing to push." && exit 0
          git add apps/e2e/tests/pages/
          CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
          git commit -m "fix(e2e): auto-heal failing tests — ${CHANGED}[autoheal]"
          git push origin main
          echo "Fix pushed. Vercel will redeploy and re-trigger CI automatically."
