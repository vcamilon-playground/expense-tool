name: E2E Tests

on:
  deployment_status:

jobs:
  # Diagnostic job — always runs, dumps the event payload so you can see
  # exactly what environment name and ref Vercel sends. Safe to remove later.
  debug-event:
    name: Debug deployment event
    runs-on: ubuntu-latest
    steps:
      - name: Print deployment info
        run: |
          echo "state:       ${{ github.event.deployment_status.state }}"
          echo "environment: ${{ github.event.deployment.environment }}"
          echo "ref:         ${{ github.event.deployment.ref }}"
          echo "target_url:  ${{ github.event.deployment_status.target_url }}"

  e2e:
    name: Playwright smoke tests
    # Vercel may use "Production" or "production" for the environment name.
    # Checking the ref is more reliable: only run for main-branch deployments
    # that succeeded.
    if: |
      github.event.deployment_status.state == 'success' &&
      (github.event.deployment.ref == 'main' ||
       github.event.deployment.environment == 'Production' ||
       github.event.deployment.environment == 'production')

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: apps/e2e

      - name: Run E2E tests against deployed URL
        run: npx playwright test --project=chromium
        working-directory: apps/e2e
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/e2e/playwright-report/
          retention-days: 14
