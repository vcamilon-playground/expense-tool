name: E2E Tests

on:
  deployment_status:

jobs:
  e2e:
    name: Playwright smoke tests
    # Single-line condition avoids YAML block-scalar / || parser edge cases.
    # Runs on every successful Vercel deployment (preview + production).
    if: github.event.deployment_status.state == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Print deployment info
        run: |
          echo "environment: ${{ github.event.deployment.environment }}"
          echo "ref:         ${{ github.event.deployment.ref }}"
          echo "target_url:  ${{ github.event.deployment_status.target_url }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: apps/e2e

      - name: Run E2E tests against deployed URL
        run: npx playwright test --project=chromium
        working-directory: apps/e2e
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/e2e/playwright-report/
          retention-days: 14
