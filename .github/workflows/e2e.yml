name: E2E Tests

# Fires automatically when Vercel updates a GitHub Deployment status.
# Vercel's GitHub app creates a Deployment and marks it 'success' or 'failure'
# for every push to main — no extra secrets or webhooks needed.
on:
  deployment_status:

jobs:
  e2e:
    name: Playwright smoke tests
    # Only run when the deployment succeeded AND it is the Production environment
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: apps/e2e

      - name: Run E2E tests against deployed URL
        run: npx playwright test --project=chromium
        working-directory: apps/e2e
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/e2e/playwright-report/
          retention-days: 14
