name: E2E Tests

on:
  deployment_status:

jobs:
  e2e-smoke:
    name: Playwright — smoke tests
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Print deployment info
        run: |
          echo "environment: ${{ github.event.deployment.environment }}"
          echo "ref:         ${{ github.event.deployment.ref }}"
          echo "target_url:  ${{ github.event.deployment_status.target_url }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: apps/e2e

      - name: Run smoke tests against deployed URL
        id: run-tests
        continue-on-error: true
        shell: bash
        run: npx playwright test --project=chromium
        working-directory: apps/e2e
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          SMOKE_ONLY: '1'
          CI: true

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke-${{ github.run_id }}
          path: apps/e2e/playwright-report/
          retention-days: 14

      - name: Fail job if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

  e2e-regression:
    name: Playwright — regression tests
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Print deployment info
        run: |
          echo "environment: ${{ github.event.deployment.environment }}"
          echo "ref:         ${{ github.event.deployment.ref }}"
          echo "target_url:  ${{ github.event.deployment_status.target_url }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: apps/e2e

      - name: Run regression tests against deployed URL
        id: run-tests
        continue-on-error: true
        shell: bash
        run: >
          npx playwright test --project=chromium
          tests/budgets.regression.spec.ts
          tests/expenses.regression.spec.ts
          tests/recurring.regression.spec.ts
          tests/settings.regression.spec.ts
        working-directory: apps/e2e
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          CI: true

      - name: Upload regression test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-regression-${{ github.run_id }}
          path: apps/e2e/playwright-report/
          retention-days: 14

      - name: Fail job if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1
